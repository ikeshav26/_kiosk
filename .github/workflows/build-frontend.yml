name: Release Kiosk Frontend

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Semantic Version number (e.g., 1.0.5)"
                required: true
                type: string

jobs:
    bump-version:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        defaults:
            run:
                working-directory: ./client
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Update package version
              run: |
                  CLEAN_VERSION="${{ github.event.inputs.version }}"
                  CLEAN_VERSION="${CLEAN_VERSION#v}"
                  npm version $CLEAN_VERSION --no-git-tag-version

            - name: Commit and push version bump
              working-directory: .
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add client/package.json
                  git commit -m "chore(release): bump frontend to v${{ github.event.inputs.version }}"
                  git tag v${{ github.event.inputs.version }}
                  git push origin HEAD
                  git push origin v${{ github.event.inputs.version }}

    release:
        needs: bump-version
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest]
        permissions:
            contents: write

        defaults:
            run:
                working-directory: ./client

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10
                  run_install: false

            - name: Get pnpm store directory
              id: pnpm-cache
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v4
              with:
                  path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build and Publish Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm run build:publish
